<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Your Opinion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="card login-card">
        <div class="login-brand">
          <h1>Rate Your Opinion</h1>
        </div>
        <p class="login-subtitle">Vote on assumptions about campus life</p>
        <input type="text" id="name-input" placeholder="Your name" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <input type="password" id="password-input" class="hidden" placeholder="Enter password" autocomplete="off" style="margin-top: 8px;">
        <button id="login-btn" class="btn-primary">Continue</button>
        <p id="login-error" class="error-text"></p>
        <div class="login-divider"><span>or</span></div>
        <button id="fresher-btn" class="btn-secondary">Browse as Fresher</button>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen">
      <header>
        <h2>
          <span class="user-badge">
            <span class="user-avatar" id="user-avatar"></span>
            <span>Welcome, <span id="user-display"></span></span>
          </span>
        </h2>
        <button id="logout-btn" class="logout-btn">Logout</button>
      </header>

      <div class="card add-question-card">
        <h3>Add a New Assumption</h3>
        <textarea id="new-question-input" placeholder="Type a new assumption here..." rows="2"></textarea>
        <button id="add-question-btn" class="btn-primary">Add Question</button>
        <p id="add-error" class="error-text"></p>
      </div>

      <div class="card admin-voters-card">
        <h3>Manage Voters</h3>
        <div id="voter-list" class="voter-list"></div>
        <div class="add-voter-row">
          <input type="text" id="add-voter-input" placeholder="Add voter name" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
          <button id="add-voter-btn" class="btn-primary" style="width: auto; padding: 12px 20px; flex-shrink: 0;">Add</button>
        </div>
        <p id="voter-error" class="error-text"></p>
      </div>

      <div id="questions-list"></div>
    </div>

  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Question Card Template -->
  <template id="question-template">
    <div class="card question-card">
      <p class="question-text"></p>
      <div class="admin-actions">
        <button class="admin-btn admin-edit">Edit</button>
        <button class="admin-btn admin-delete">Delete</button>
      </div>
      <div class="rating-section">
        <p class="rating-label">Rate this assumption</p>
        <div class="rating-buttons">
          <button class="rate-btn" data-val="1">1</button>
          <button class="rate-btn" data-val="2">2</button>
          <button class="rate-btn" data-val="3">3</button>
          <button class="rate-btn" data-val="4">4</button>
          <button class="rate-btn" data-val="5">5</button>
          <button class="rate-btn" data-val="6">6</button>
          <button class="rate-btn" data-val="7">7</button>
          <button class="rate-btn" data-val="8">8</button>
          <button class="rate-btn" data-val="9">9</button>
          <button class="rate-btn" data-val="10">10</button>
        </div>
        <div class="status-msg"></div>
      </div>
      <div class="results-section hidden">
        <div class="results-header">
          <span class="avg-rating-value"><span class="avg-rating">0.0</span><span class="avg-max"> / 10</span></span>
          <span class="vote-badge"><span class="votes">0</span> vote(s)</span>
        </div>
        <div class="rating-bar">
          <div class="rating-bar-fill" style="width: 0%"></div>
        </div>
        <div class="voters-list"></div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
